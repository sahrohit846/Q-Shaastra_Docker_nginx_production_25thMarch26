<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}" />
    <script src="{% static 'js/dashboard.js' %}" defer></script>
  </head>
  <body>
    <div class="container">
      <h1>Welcome to the Dashboard</h1>

      <!-- Tab Navigation -->
      <div class="tabs">
        <button class="tab-link" onclick="openTab(event, 'features')">
          Features
        </button>
        <button class="tab-link" onclick="openTab(event, 'profile')">
          Profile
        </button>
      </div>

      <!-- Features Section -->
      <div id="features" class="tab-content">
        <h2>Your Features</h2>
        <!-- Include your existing feature content here -->
      </div>

      <!-- Profile Section -->
      <div id="profile" class="tab-content">
        <h2>Profile</h2>
        <form
          id="profileForm"
          action="{% url 'update_profile' %}"
          method="post"
          enctype="multipart/form-data"
        >
          {% csrf_token %}
          <label for="profile-photo">Profile Photo:</label>
          <input type="file" id="profile-photo" name="profile_photo" />

          <label for="email">Email:</label>
          <input
            type="email"
            id="email"
            name="email"
            value="{{ user.email }}"
          />

          <label for="contact">Contact Number:</label>
          <input
            type="tel"
            id="contact"
            name="contact"
            value="{{ user.contact }}"
          />

          <button type="submit">Update Profile</button>
        </form>
        <div id="update-status"></div>
      </div>
    </div>
  </body>
</html>
