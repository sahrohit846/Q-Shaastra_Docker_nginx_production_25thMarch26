services:
  # Django application server (no port exposed, only accessible via Nginx)
  web:
    build: .
    entrypoint: ["/bin/sh", "/app/entrypoint.sh"]
    command: gunicorn simulator.wsgi:application --bind 0.0.0.0:8000 --workers 1 --timeout 60
    volumes:
      - .:/app
      - staticfiles:/app/staticfiles
    env_file:
      - .env
    depends_on:
      - redis
      - mongo
    networks:
      - app_network
    expose:
      - "8000"  # Only expose to internal network, not to host

  # Nginx reverse proxy and static/media file server
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/static:ro
      - staticfiles:/app/staticfiles:ro
      - ./public/media:/media:ro
    depends_on:
      - web
    networks:
      - app_network

  # Redis for caching and Celery broker
  redis:
    image: redis:7-alpine
    networks:
      - app_network

  # MongoDB database
  mongo:
    image: mongo:6
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network

  # Celery worker for background tasks
  celery_worker:
    build: .
    entrypoint: ["/bin/sh", "/app/entrypoint.sh"]
    # Limit concurrency to 2 to prevent RAM exhaustion from loading massive models
    command: celery -A simulator worker -l info --concurrency=2
    volumes:
      - .:/app
      - staticfiles:/app/staticfiles
    environment:
      # Force PyTorch to use 1 thread per process so Celery workers don't fight over the CPU
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
    env_file:
      - .env
    depends_on:
      - redis
      - mongo
      - web
    networks:
      - app_network

  # Celery beat for scheduled tasks
  celery_beat:
    build: .
    entrypoint: ["/bin/sh", "/app/entrypoint.sh"]
    command: celery -A simulator beat -l info
    volumes:
      - .:/app
      - staticfiles:/app/staticfiles
    env_file:
      - .env
    depends_on:
      - redis
      - mongo
      - web
    networks:
      - app_network

# Named volumes for persistence
volumes:
  mongo_data:
  staticfiles:

# Network for inter-container communication
networks:
  app_network:
    driver: bridge
